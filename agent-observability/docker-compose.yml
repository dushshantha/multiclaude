services:
  db:
    image: postgres:16-alpine
    container_name: agent-observability-db
    environment:
      POSTGRES_USER: agentobs
      POSTGRES_PASSWORD: agentobs
      POSTGRES_DB: agent_observability
    ports:
      - "5432:5432"
    volumes:
      - agent_obs_pgdata:/var/lib/postgresql/data

volumes:
  agent_obs_pgdata:
