<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiClaude — Run</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
    h1 { color: #7c83fd; margin-bottom: 4px; font-size: 24px; }
    .subtitle { color: #555; font-size: 12px; margin-bottom: 8px; }
    .nav { display: flex; gap: 16px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
    .nav a { color: #7c83fd; text-decoration: none; font-size: 13px; }
    .nav a:hover { text-decoration: underline; }
    .nav .sep { color: #444; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat { padding: 12px 20px; border-radius: 8px; background: #16213e; min-width: 100px; }
    .stat .count { font-size: 28px; font-weight: bold; }
    .stat .label { font-size: 12px; color: #888; margin-top: 4px; }
    .stat.running .count { color: #7c83fd; }
    .stat.done .count { color: #4ade80; }
    .stat.failed .count { color: #f87171; }
    .stat.pending .count { color: #888; }
    .stat.tokens .count { color: #a78bfa; }
    .stat.cost .count { color: #34d399; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; color: #666; font-size: 12px; border-bottom: 1px solid #2a2a4e; }
    td { padding: 8px 12px; border-bottom: 1px solid #1e1e3a; font-size: 13px; vertical-align: top; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .badge.pending { background: #2a2a4e; color: #888; }
    .badge.in_progress { background: #1e1e5e; color: #7c83fd; }
    .badge.done { background: #14532d; color: #4ade80; }
    .badge.failed { background: #450a0a; color: #f87171; }
    .badge.cancelled { background: #1a1a1a; color: #555; }
    .model-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    .model-badge.haiku { background: #14532d; color: #4ade80; }
    .model-badge.sonnet { background: #1e1e5e; color: #7c83fd; }
    .model-badge.opus { background: #3b0764; color: #c084fc; }
    .retry { color: #fbbf24; font-size: 11px; }
    .task-row { cursor: pointer; }
    .task-row:hover td { background: #1e1e3a; }
    td, th, .log-entry, .log-path { user-select: text; }
    .log-row td { padding: 0; border-bottom: none; }
    .log-panel {
      display: none;
      background: #0d0d1f;
      border-left: 2px solid #2a2a4e;
      padding: 10px 14px;
      margin: 0;
    }
    .log-panel.open { display: block; }
    .log-panel .log-path {
      font-size: 11px; color: #555; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .log-panel .log-path span { color: #7c83fd; }
    .log-panel .log-entries { max-height: 240px; overflow-y: auto; }
    .log-entry { font-size: 12px; line-height: 1.5; color: #aaa; }
    .log-entry .ts { color: #444; margin-right: 6px; }
    .log-entry.warn { color: #fbbf24; }
    .log-entry.done-msg { color: #4ade80; }
    .log-panel .empty { color: #555; font-size: 12px; font-style: italic; }
    .expand-hint { color: #555; font-size: 11px; margin-left: 6px; }
    .tokens { color: #a78bfa; }
    .cost-val { color: #34d399; }
    .duration { color: #94a3b8; }
    .token-detail { font-size: 11px; color: #666; margin-top: 2px; }
    .ext-ref a { color: #7c83fd; font-size: 12px; text-decoration: none; }
    .ext-ref a:hover { text-decoration: underline; }
    .ext-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; background: #1e1e5e; color: #7c83fd; font-size: 12px; text-decoration: none; margin-top: 6px; }
    .ext-badge:hover { background: #2a2a7e; }
    .empty-state { color: #555; font-style: italic; padding: 24px 12px; }
    .ticket-header td { background: #12122a; color: #7c83fd; font-size: 12px; font-weight: bold; padding: 6px 12px; border-bottom: 1px solid #2a2a4e; position: sticky; top: 0; z-index: 1; letter-spacing: 0.05em; text-transform: uppercase; }
    .ticket-header .ticket-label { color: #a78bfa; margin-right: 8px; }
    .ticket-header .ticket-count { color: #555; font-weight: normal; }
    .dag-section { margin-bottom: 24px; }
    .dag-section h2 { font-size: 13px; color: #555; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    #dag-container { overflow: auto; background: #0d0d1f; border-radius: 8px; padding: 16px; max-height: 500px; }
  </style>
</head>
<body>
  <h1 id="run-title">Run</h1>
  <div class="subtitle" id="run-ext-ref"></div>
  <div class="nav">
    <a href="/">Projects</a>
    <span class="sep">·</span>
    <a id="nav-project" href="/">...</a>
    <span class="sep">·</span>
    <span id="nav-run" style="color:#666">...</span>
    <span class="sep">·</span>
    <a href="/tasks">All Tasks</a>
  </div>
  <div class="stats">
    <div class="stat running"><div class="count" id="running">0</div><div class="label">Running</div></div>
    <div class="stat done"><div class="count" id="done">0</div><div class="label">Done</div></div>
    <div class="stat failed"><div class="count" id="failed">0</div><div class="label">Failed</div></div>
    <div class="stat pending"><div class="count" id="pending">0</div><div class="label">Pending</div></div>
    <div class="stat tokens"><div class="count" id="total-tokens">0</div><div class="label">Tokens</div></div>
    <div class="stat cost"><div class="count" id="total-cost">$0</div><div class="label" id="cost-label">Cost</div></div>
  </div>
  <div class="dag-section">
    <h2>Task Graph</h2>
    <div id="dag-container" style="display:none"></div>
  </div>
  <table>
    <thead>
      <tr>
        <th>Task</th>
        <th>Status</th>
        <th>Model</th>
        <th>Agent</th>
        <th>Retries</th>
        <th>Duration</th>
        <th>Tokens</th>
        <th>Cost</th>
      </tr>
    </thead>
    <tbody id="tasks"></tbody>
  </table>
  <script>
    const openPanels = new Set()
    // Map of taskId -> EventSource for live log streams
    const logStreams = new Map()
    let latestData = null
    let agentLogPaths = {}
    let dagEdges = []
    let runBudgetUsd = null

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    function formatTime(ts) {
      if (!ts) return ''
      return ts.replace('T', ' ').slice(11, 19)
    }

    function formatDuration(seconds) {
      if (seconds == null) return ''
      const s = Math.floor(seconds)
      if (s < 60) return `${s}s`
      const m = Math.floor(s / 60)
      const rem = s % 60
      return rem > 0 ? `${m}m ${rem}s` : `${m}m`
    }

    function formatTokens(n) {
      if (n == null || n === 0) return ''
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k'
      return String(n)
    }

    function formatCost(usd) {
      if (usd == null || usd === 0) return '-'
      if (usd < 0.001) return '<$0.001'
      if (usd < 1) return '$' + usd.toFixed(3)
      return '$' + usd.toFixed(2)
    }

    function elapsedSeconds(startedAt) {
      if (!startedAt) return null
      const start = new Date(startedAt.replace(' ', 'T') + 'Z').getTime()
      return (Date.now() - start) / 1000
    }

    function isUrl(str) {
      try { new URL(str); return true } catch { return false }
    }

    function makeLogEntryHtml(l) {
      const cls = l.message.startsWith('DONE') ? 'done-msg' : l.level === 'warn' ? 'warn' : ''
      return `<div class="log-entry ${cls}"><span class="ts">${escapeHtml(formatTime(l.created_at))}</span>${escapeHtml(l.message)}</div>`
    }

    function startLogStream(taskId) {
      if (logStreams.has(taskId)) return
      const panel = document.getElementById(`log-panel-${taskId}`)
      if (!panel) return

      const stream = new EventSource(`/api/logs/stream?task_id=${encodeURIComponent(taskId)}`)
      logStreams.set(taskId, stream)

      stream.onmessage = ({ data }) => {
        const logs = JSON.parse(data)
        if (!logs.length) return
        const currentPanel = document.getElementById(`log-panel-${taskId}`)
        const currentEntries = currentPanel?.querySelector('.log-entries')
        if (!currentEntries) return

        const empty = currentEntries.querySelector('.empty')
        if (empty) empty.remove()

        const wasAtBottom = currentEntries.scrollHeight - currentEntries.scrollTop <= currentEntries.clientHeight + 4
        logs.forEach(l => {
          currentEntries.insertAdjacentHTML('beforeend', makeLogEntryHtml(l))
        })
        if (wasAtBottom) currentEntries.scrollTop = currentEntries.scrollHeight
      }

      stream.onerror = () => {
        // SSE will auto-reconnect; no action needed
      }
    }

    function stopLogStream(taskId) {
      const stream = logStreams.get(taskId)
      if (stream) {
        stream.close()
        logStreams.delete(taskId)
      }
    }

    function buildLogPanelSkeleton(taskId) {
      const agentId = latestData?.find(t => t.id === taskId)?.agent_id
      const logPath = agentId ? agentLogPaths[agentId] : null
      const pathHtml = logPath
        ? `<div class="log-path">Full output: <span>tail -f ${escapeHtml(logPath)}</span></div>`
        : ''
      return `${pathHtml}<div class="log-entries"><div class="empty">Loading logs…</div></div>`
    }

    function renderDag(tasks, edges) {
      const container = document.getElementById('dag-container')
      if (!tasks || tasks.length === 0) { container.style.display = 'none'; return }
      container.style.display = 'block'

      const taskById = {}
      tasks.forEach(t => { taskById[t.id] = t })

      // Build incoming-deps map: taskId -> [from_task_ids]
      const inDeps = {}
      tasks.forEach(t => { inDeps[t.id] = [] })
      edges.forEach(e => {
        if (inDeps[e.to_task] !== undefined && taskById[e.from_task]) {
          inDeps[e.to_task].push(e.from_task)
        }
      })

      // Compute topological level for each task
      const levels = {}
      const visiting = new Set()
      function computeLevel(id) {
        if (levels[id] !== undefined) return levels[id]
        if (visiting.has(id)) { levels[id] = 0; return 0 } // cycle guard
        visiting.add(id)
        const deps = inDeps[id] || []
        levels[id] = deps.length === 0 ? 0 : Math.max(...deps.map(d => computeLevel(d))) + 1
        visiting.delete(id)
        return levels[id]
      }
      tasks.forEach(t => computeLevel(t.id))

      // Group tasks into waves by level
      const maxLevel = Math.max(...tasks.map(t => levels[t.id]))
      const waves = []
      for (let i = 0; i <= maxLevel; i++) waves.push([])
      tasks.forEach(t => waves[levels[t.id]].push(t))

      // Layout constants
      const NW = 180, NH = 50, HG = 72, VG = 14, M = 20

      const svgW = M * 2 + waves.length * NW + (waves.length - 1) * HG
      const maxWaveH = Math.max(...waves.map(w => w.length * NH + Math.max(0, w.length - 1) * VG))
      const svgH = M * 2 + maxWaveH

      // Compute node center positions
      const pos = {}
      waves.forEach((wave, wi) => {
        const waveH = wave.length * NH + Math.max(0, wave.length - 1) * VG
        const startY = M + (maxWaveH - waveH) / 2
        wave.forEach((t, ti) => {
          const x = M + wi * (NW + HG)
          const y = startY + ti * (NH + VG)
          pos[t.id] = { x, y, cx: x + NW / 2, cy: y + NH / 2 }
        })
      })

      // Status style map
      const SC = {
        pending:     { fill: '#2a2a4e', stroke: '#555',    text: '#888' },
        in_progress: { fill: '#1e1e5e', stroke: '#7c83fd', text: '#7c83fd' },
        done:        { fill: '#14532d', stroke: '#4ade80', text: '#4ade80' },
        failed:      { fill: '#450a0a', stroke: '#f87171', text: '#f87171' },
        cancelled:   { fill: '#1c1c1c', stroke: '#444',    text: '#555' },
      }

      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" style="display:block">`
      svg += `<defs><marker id="dag-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#555"/></marker></defs>`

      // Draw edges first (behind nodes)
      edges.forEach(e => {
        const s = pos[e.from_task], d = pos[e.to_task]
        if (!s || !d) return
        const x1 = s.x + NW, y1 = s.cy
        const x2 = d.x, y2 = d.cy
        const midX = (x1 + x2) / 2
        svg += `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#dag-arrow)"/>`
      })

      // Draw nodes
      tasks.forEach(t => {
        const p = pos[t.id]
        if (!p) return
        const c = SC[t.status] || SC.pending
        const raw = t.title || t.id
        const label = raw.length > 22 ? raw.slice(0, 21) + '\u2026' : raw
        svg += `<rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="5" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>`
        svg += `<text x="${p.cx}" y="${p.cy - 6}" text-anchor="middle" fill="${c.text}" font-family="'Courier New',monospace" font-size="11">${escapeHtml(label)}</text>`
        svg += `<text x="${p.cx}" y="${p.cy + 11}" text-anchor="middle" fill="${c.text}" font-family="'Courier New',monospace" font-size="10" opacity="0.7">${t.status.replace('_', ' ')}</text>`
      })

      svg += '</svg>'
      container.innerHTML = svg
    }

    function renderTasks(tasks) {
      latestData = tasks
      document.getElementById('running').textContent = tasks.filter(t => t.status === 'in_progress').length
      document.getElementById('done').textContent = tasks.filter(t => t.status === 'done').length
      document.getElementById('failed').textContent = tasks.filter(t => t.status === 'failed').length
      document.getElementById('pending').textContent = tasks.filter(t => t.status === 'pending').length
      const totalTok = tasks.reduce((sum, t) => sum + (t.total_tokens || 0), 0)
      document.getElementById('total-tokens').textContent = formatTokens(totalTok) || '0'
      const totalCost = tasks.reduce((sum, t) => sum + (t.cost_usd || 0), 0)
      if (runBudgetUsd != null && totalCost > 0) {
        document.getElementById('total-cost').textContent = '$' + totalCost.toFixed(2) + ' / $' + runBudgetUsd.toFixed(2)
      } else {
        document.getElementById('total-cost').textContent = totalCost > 0 ? formatCost(totalCost) : '$0'
      }

      const tbody = document.getElementById('tasks')
      if (tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No tasks in this run.</td></tr>'
        return
      }

      function renderTaskRow(t) {
        const isOpen = openPanels.has(t.id)
        const hint = t.agent_id ? '<span class="expand-hint">▶ click to expand</span>' : ''
        const durSecs = t.status === 'in_progress' ? elapsedSeconds(t.started_at) : t.duration_seconds
        const durHtml = durSecs != null
          ? `<span class="duration">${formatDuration(durSecs)}${t.status === 'in_progress' ? ' ▸' : ''}</span>`
          : '-'
        const tokHtml = t.total_tokens
          ? `<span class="tokens">${formatTokens(t.total_tokens)}</span><div class="token-detail">${formatTokens(t.input_tokens)}↑ ${formatTokens(t.output_tokens)}↓</div>`
          : '-'
        const modelKey = (t.model || '').toLowerCase().includes('haiku') ? 'haiku' : (t.model || '').toLowerCase().includes('opus') ? 'opus' : 'sonnet'
        const modelHtml = t.model ? `<span class="model-badge ${modelKey}">${escapeHtml(modelKey)}</span>` : '-'
        const costHtml = t.cost_usd ? `<span class="cost-val">${formatCost(t.cost_usd)}</span>` : '-'
        return `
          <tr class="task-row" onclick="togglePanel('${escapeHtml(t.id)}')">
            <td>${escapeHtml(t.title)}${hint}</td>
            <td><span class="badge ${t.status}">${t.status.replace('_', ' ')}</span></td>
            <td>${modelHtml}</td>
            <td>${escapeHtml(t.agent_id || '-')}</td>
            <td>${t.retry_count > 0 ? `<span class="retry">⚠ ${t.retry_count}/${t.max_retries}</span>` : '-'}</td>
            <td>${durHtml}</td>
            <td>${tokHtml}</td>
            <td>${costHtml}</td>
          </tr>
          <tr class="log-row" id="log-row-${escapeHtml(t.id)}">
            <td colspan="8">
              <div class="log-panel ${isOpen ? 'open' : ''}" id="log-panel-${escapeHtml(t.id)}">
                ${isOpen ? buildLogPanelSkeleton(t.id) : ''}
              </div>
            </td>
          </tr>
        `
      }

      // Check if any tasks have a ticket field
      const hasTickets = tasks.some(t => t.ticket)

      let rows
      if (!hasTickets) {
        rows = tasks.map(renderTaskRow).join('')
      } else {
        // Group tasks by ticket; tasks without ticket go under null key
        const groups = new Map()
        for (const t of tasks) {
          const key = t.ticket || null
          if (!groups.has(key)) groups.set(key, [])
          groups.get(key).push(t)
        }

        // Sort: named tickets first (alphabetically), then ungrouped last
        const sortedKeys = [...groups.keys()].sort((a, b) => {
          if (a === null) return 1
          if (b === null) return -1
          return a.localeCompare(b)
        })

        rows = sortedKeys.map(key => {
          const groupTasks = groups.get(key)
          const headerLabel = key ? escapeHtml(key) : 'Ungrouped'
          const header = `<tr class="ticket-header"><td colspan="8"><span class="ticket-label">${headerLabel}</span><span class="ticket-count">${groupTasks.length} task${groupTasks.length === 1 ? '' : 's'}</span></td></tr>`
          return header + groupTasks.map(renderTaskRow).join('')
        }).join('')
      }

      tbody.innerHTML = rows

      // Re-attach live streams for any open panels (DOM was rebuilt)
      for (const taskId of openPanels) {
        const stream = logStreams.get(taskId)
        if (stream) {
          stream.close()
          logStreams.delete(taskId)
        }
        startLogStream(taskId)
      }
    }

    function togglePanel(taskId) {
      if (window.getSelection && window.getSelection().toString()) return
      if (openPanels.has(taskId)) {
        openPanels.delete(taskId)
        stopLogStream(taskId)
      } else {
        openPanels.add(taskId)
      }
      if (latestData) renderTasks(latestData)
    }

    function formatExtRef(ref) {
      if (!isUrl(ref)) return { label: escapeHtml(ref), href: null }
      try {
        const url = new URL(ref)
        if (url.hostname === 'github.com') {
          const parts = url.pathname.split('/').filter(Boolean)
          // parts: [owner, repo, 'issues'|'pull', number]
          if (parts.length >= 4) {
            const type = parts[2] === 'pull' ? 'PR' : parts[2] === 'issues' ? 'Issue' : parts[2]
            return { label: `GitHub ${type} #${parts[3]} ↗`, href: escapeHtml(ref) }
          }
        }
        return { label: `${escapeHtml(url.hostname)} ↗`, href: escapeHtml(ref) }
      } catch {
        return { label: escapeHtml(ref), href: null }
      }
    }

    const runId = location.pathname.split('/').pop()

    async function loadRunMeta() {
      try {
        const resp = await fetch(`/api/runs/${runId}`)
        if (!resp.ok) { document.getElementById('run-title').textContent = 'Run not found'; return }
        const { run } = await resp.json()
        dagEdges = run.edges || []
        if (latestData) renderDag(latestData, dagEdges)
        runBudgetUsd = run.budget_usd ?? null
        if (runBudgetUsd != null) {
          document.getElementById('cost-label').textContent = `Cost / $${runBudgetUsd.toFixed(2)} budget`
        }
        document.title = `MultiClaude — ${run.title}`
        document.getElementById('run-title').textContent = run.title
        document.getElementById('nav-run').textContent = run.title

        if (run.external_ref) {
          const extEl = document.getElementById('run-ext-ref')
          const { label, href } = formatExtRef(run.external_ref)
          if (href) {
            extEl.innerHTML = `<a class="ext-badge" href="${href}" target="_blank">${label}</a>`
          } else {
            extEl.innerHTML = `<span class="ext-badge" style="background:#2a2a2e;color:#888">${label}</span>`
          }
        }

        // Try to fetch project info for nav breadcrumb
        if (run.project_id) {
          try {
            const pr = await fetch(`/api/projects/${run.project_id}`)
            if (pr.ok) {
              const { project } = await pr.json()
              const navLink = document.getElementById('nav-project')
              navLink.textContent = project.name
              navLink.href = `/projects/${project.id}`
            }
          } catch {}
        }
      } catch (e) {
        document.getElementById('run-title').textContent = 'Error loading run'
      }
    }

    loadRunMeta()

    // Use server-side run_id filter on SSE so only this run's tasks are streamed
    const es = new EventSource(`/api/events?run_id=${encodeURIComponent(runId)}`)
    es.onmessage = ({ data }) => {
      const snapshot = JSON.parse(data)
      agentLogPaths = snapshot.agentLogPaths || {}
      const runTasks = snapshot.tasks || []
      // Skip task-table re-render if only logs changed (live streams handle that)
      if (JSON.stringify(latestData) !== JSON.stringify(runTasks)) {
        renderTasks(runTasks)
        renderDag(runTasks, dagEdges)
      }
    }
  </script>
</body>
</html>
